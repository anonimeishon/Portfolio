<!doctype html>
<html lang="en">
  <head>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/+esm",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
        }
      }
    </script>
    <!-- "gsap": "https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>pkbd</title>
    <link rel="stylesheet" href="css/pokemonBorder.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/canvas.css" />
    <link rel="stylesheet" href="css/keys.css" />

    <script src="js/index.js" type="module"></script>
  </head>
  <body>
    <div id="startScreen" class="start-screen">
      <div class="start-screen-content">
        <div id="loadingBarContainer" class="loading-bar-container">
          <div class="loading-text-container">
            <p id="loadingText" class="pkfnt">Loading</p>
          </div>
          <div class="pkbd loading-bar">
            <div class="loading-bar-track">
              <div id="loadingBar" class="loading-bar-fill"></div>
            </div>
          </div>
        </div>
        <p
          id="startBtn"
          onclick="requestPermissions()"
          class="pkbd pkbd-clickable"
          hidden
        >
          Click to start
        </p>
      </div>
    </div>
    <main class="canvas-container">
      <canvas class="main-canvas" id="renderCanvas" tabindex="0"></canvas>
      <!-- <canvas id="debug-canvas" width="437" height="1240"></canvas> -->
      <div class="camera-controls invert">
        <button
          id="cameraSwitchButton"
          type="button"
          class="camera-orbit-button pkbd"
          onclick="switchCameraMode()"
        >
          <svg
            id="cameraOrbitSvg"
            class="camera-orbit-svg"
            width="50"
            height="50"
            viewBox="0 0 250 250"
          >
            <!-- Set to match viewBox (250x250) -->
            <rect
              id="rectFill"
              x="0"
              y="0"
              width="250"
              height="250"
              fill="black"
              rx="4"
              ry="4"
            ></rect>
          </svg>

          <img
            class="camera-orbit-image"
            width="34"
            height="34"
            alt="Camera Icon"
            src="assets/icons/camera.svg"
          />
        </button>
      </div>
      <div class="info" id="info">
        <p class="pkbd sm invert">
          Controls: Arrow keys to move, Enter key to interact
        </p>
      </div>
    </main>
    <div class="canvas-container game-container">
      <canvas
        class="main-canvas"
        id="mainCanvas"
        width="480"
        height="432"
        tabindex="0"
      ></canvas>
    </div>
    <!-- <div class="game-instructions-container">
      <p class="pkbd sm game-instructions">
        Click on the game screen to interact and enable sound
      </p>
    </div> -->

    <div class="controls" id="controls">
      <div id="arrowKeys" class="arrowKeys">
        <div id="arrowKeyUp" class="arrowKey up"></div>
        <div id="arrowKeyDown" class="arrowKey down"></div>
        <div id="arrowKeyLeft" class="arrowKey left"></div>
        <div id="arrowKeyRight" class="arrowKey right"></div>
      </div>
      <div id="controlKeys" class="controlKeys">
        <div id="controlKeyA" class="controlKey a">A</div>
        <div id="controlKeyB" class="controlKey b">B</div>
      </div>
    </div>
  </body>
</html>
